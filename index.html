<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard IntelFon - InnovaIGT</title>
  <!-- Tailwind CSS para los estilos oscuros -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- SDK Oficial de Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #0b1120; color: #f3f4f6; }
    input, select { background-color: #1e293b; color: #ffffff; border: 1px solid #334155; }
    th { background-color: #1e293b; color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    td { border-bottom: 1px solid #1e293b; }
  </style>
</head>
<body class="p-6 font-sans">

  <!-- CONTADORES SUPERIORES -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-[#111827] p-4 rounded-lg border border-gray-800">
      <span class="text-xs text-gray-400 font-bold tracking-wider uppercase">LEADS</span>
      <div id="cant-leads" class="text-3xl font-extrabold text-cyan-400 mt-1">0</div>
    </div>
    <div class="bg-[#111827] p-4 rounded-lg border border-gray-800">
      <span class="text-xs text-gray-400 font-bold tracking-wider uppercase">HISTORIALES</span>
      <div id="cant-hist" class="text-3xl font-extrabold text-cyan-400 mt-1">0</div>
    </div>
    <div class="bg-[#111827] p-4 rounded-lg border border-gray-800">
      <span class="text-xs text-gray-400 font-bold tracking-wider uppercase">LLAMADAS</span>
      <div id="cant-llam" class="text-3xl font-extrabold text-cyan-400 mt-1">0</div>
    </div>
    <div class="bg-[#111827] p-4 rounded-lg border border-gray-800">
      <span class="text-xs text-gray-400 font-bold tracking-wider uppercase">TOTAL GENERAL</span>
      <div id="cant-total" class="text-3xl font-extrabold text-emerald-400 mt-1">0</div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    
    <!-- PANEL DE CONFIGURACIÓN Y FILTROS -->
    <div class="space-y-6">
      <!-- Credenciales -->
      <div class="bg-[#111827] p-5 rounded-lg border border-gray-800 space-y-3">
        <h2 class="text-sm font-bold text-gray-300 flex items-center gap-2">⚙️ Configuración</h2>
        <div>
          <label class="block text-xs text-gray-400 mb-1">URL de Supabase</label>
          <input type="text" id="sb-url" value="https://sbopifiyezmvsadwkpg.supabase.co" class="w-full p-2 text-xs rounded focus:outline-none focus:border-cyan-500">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Anon Key de Supabase</label>
          <input type="password" id="sb-key" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNib3BpZml5ZXptdnNhZHdrcGciLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczODE3NTI1OSwiZXhwIjoyMDUzNzUxMjU5fQ.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNib3BpZml5ZXptdnNhZHdrcGciLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczODE3NTI1OSwiZXhwIjoyMDUzNzUxMjU5fQ" class="w-full p-2 text-xs rounded focus:outline-none focus:border-cyan-500">
        </div>
        <div class="flex gap-2">
          <button onclick="toggleKey()" class="bg-gray-800 text-xs px-3 py-1.5 rounded hover:bg-gray-700">👁️ Mostrar/Ocultar Credenciales</button>
        </div>
      </div>

      <!-- Filtros y Acciones -->
      <div class="bg-[#111827] p-5 rounded-lg border border-gray-800 space-y-4">
        <h2 class="text-sm font-bold text-gray-300">🎛️ Filtros y Acciones</h2>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Tabla</label>
          <select id="select-tabla" class="w-full p-2 text-xs rounded">
            <option value="llamadas">Llamadas</option>
            <option value="leads">Leads</option>
            <option value="historiales">Historiales</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs text-gray-400 mb-1">Desde</label>
            <input type="date" id="fecha-desde" class="w-full p-2 text-xs rounded">
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1">Hasta</label>
            <input type="date" id="fecha-hasta" class="w-full p-2 text-xs rounded">
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Buscar</label>
          <input type="text" id="input-buscar" placeholder="Buscar por cualquier campo..." class="w-full p-2 text-xs rounded">
        </div>

        <!-- Botones de Acción -->
        <div class="grid grid-cols-2 gap-2 pt-2">
          <button onclick="cargarDatosBD()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-3 text-xs rounded flex items-center justify-center gap-1">
            🗄️ Cargar BD (Supabase)
          </button>
          <button onclick="sincronizarAPI()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-3 text-xs rounded flex items-center justify-center gap-1">
            ⚡ Sincronizar API
          </button>
          <button onclick="aplicarFiltroLocal()" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-3 text-xs rounded">
            🔍 Aplicar Filtros
          </button>
          <button onclick="exportarCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-3 text-xs rounded">
            📊 Exportar CSV
          </button>
        </div>
      </div>
    </div>

    <!-- TABLA DE DATOS -->
    <div class="lg:col-span-2 bg-[#111827] p-5 rounded-lg border border-gray-800 flex flex-col">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-sm font-bold text-gray-300">📂 Datos Registrados</h2>
        <span id="estado-cargando" class="text-xs text-cyan-400 hidden">Cargando...</span>
      </div>
      
      <div class="overflow-x-auto flex-1 max-h-[550px] overflow-y-auto">
        <table id="mi-tabla-html" class="w-full text-left text-xs">
          <thead id="tabla-head">
            <tr>
              <th class="p-3">Selecciona una tabla y presiona "Cargar BD"</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <tr>
              <td class="p-4 text-center text-gray-500">No hay datos cargados aún.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- LÓGICA JAVASCRIPT -->
  <script>
    let supabaseClient = null;
    let datosCache = [];

    // Inicializar cliente Supabase
    function getSupabase() {
      const url = document.getElementById('sb-url').value.trim();
      const key = document.getElementById('sb-key').value.trim();
      if (!supabaseClient) {
        supabaseClient = window.supabase.createClient(url, key);
      }
      return supabaseClient;
    }

    // Toggle ocultar/mostrar contraseña
    function toggleKey() {
      const input = document.getElementById('sb-key');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // 1. Cargar datos desde Supabase
    async function cargarDatosBD() {
      const client = getSupabase();
      const tabla = document.getElementById('select-tabla').value;
      const estado = document.getElementById('estado-cargando');
      
      estado.classList.remove('hidden');

      try {
        const { data, error } = await client
          .from(tabla)
          .select('*')
          .limit(1000); // Límite inicial ajustable

        if (error) throw error;

        datosCache = data || [];
        renderizarTabla(datosCache);
        actualizarContadores();
      } catch (err) {
        alert("Error cargando Supabase: " + err.message);
        console.error(err);
      } finally {
        estado.classList.add('hidden');
      }
    }

    // 2. Renderizar Tabla Dinámicamente
    function renderizarTabla(datos) {
      const thead = document.getElementById('tabla-head');
      const tbody = document.getElementById('tabla-body');

      if (!datos || datos.length === 0) {
        thead.innerHTML = `<tr><th class="p-3">Sin resultados</th></tr>`;
        tbody.innerHTML = `<tr><td class="p-4 text-center text-gray-500">No hay registros que mostrar.</td></tr>`;
        return;
      }

      // Obtener nombres de columnas dinámicamente
      const columnas = Object.keys(datos[0]);

      // Generar Encabezados
      thead.innerHTML = `<tr>${columnas.map(col => `<th class="p-3">${col}</th>`).join('')}</tr>`;

      // Generar Filas (limitado a 100 visibles en DOM para fluidez)
      tbody.innerHTML = datos.slice(0, 100).map(fila => {
        return `<tr class="hover:bg-slate-800/50">${columnas.map(col => {
          let val = fila[col];
          if (val === null || val === undefined) val = '';
          return `<td class="p-3 whitespace-nowrap text-gray-300">${val}</td>`;
        }).join('')}</tr>`;
      }).join('');
    }

    // 3. Actualizar Contadores Superiores
    async function actualizarContadores() {
      const client = getSupabase();
      
      const [rLeads, rHist, rLlam] = await Promise.all([
        client.from('leads').select('*', { count: 'exact', head: true }),
        client.from('historiales').select('*', { count: 'exact', head: true }),
        client.from('llamadas').select('*', { count: 'exact', head: true })
      ]);

      const cL = rLeads.count || 0;
      const cH = rHist.count || 0;
      const cLl = rLlam.count || 0;

      document.getElementById('cant-leads').innerText = cL.toLocaleString();
      document.getElementById('cant-hist').innerText = cH.toLocaleString();
      document.getElementById('cant-llam').innerText = cLl.toLocaleString();
      document.getElementById('cant-total').innerText = (cL + cH + cLl).toLocaleString();
    }

    // 4. Sincronizar desde API Externa (Edge Function)
    async function sincronizarAPI() {
      const url = document.getElementById('sb-url').value.trim();
      const key = document.getElementById('sb-key').value.trim();
      const estado = document.getElementById('estado-cargando');

      estado.innerText = "Sincronizando API...";
      estado.classList.remove('hidden');

      try {
        const res = await fetch(`${url}/functions/v1/sincronizar-datos`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${key}`,
            'apikey': key
          }
        });

        if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);

        alert("¡Sincronización completada con éxito!");
        await cargarDatosBD();
      } catch (err) {
        alert("Error al sincronizar: " + err.message);
      } finally {
        estado.innerText = "Cargando...";
        estado.classList.add('hidden');
      }
    }

    // 5. Aplicar Filtro de búsqueda local
    function aplicarFiltroLocal() {
      const q = document.getElementById('input-buscar').value.toLowerCase().trim();
      if (!q) {
        renderizarTabla(datosCache);
        return;
      }
      
      const filtrados = datosCache.filter(item => {
        return Object.values(item).some(v => String(v).toLowerCase().includes(q));
      });

      renderizarTabla(filtrados);
    }

    // 6. Exportar a CSV
    function exportarCSV() {
      if (!datosCache || datosCache.length === 0) return alert("No hay datos para exportar.");
      
      const columnas = Object.keys(datosCache[0]);
      let csvContent = "data:text/csv;charset=utf-8," 
        + columnas.join(",") + "\n"
        + datosCache.map(e => columnas.map(c => `"${e[c] !== null ? e[c] : ''}"`).join(",")).join("\n");

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `${document.getElementById('select-tabla').value}_export.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Auto-cargas al iniciar
    window.addEventListener('DOMContentLoaded', () => {
      cargarDatosBD();
    });
  </script>
</body>
</html>
