<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard RED Intelfon - Reportes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-color: #7062bf;
      --card-bg: #ffffff;
      --primary: #5c4eb0;
      --accent: #28a745;
      --danger: #dc3545;
      --text: #333333;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 20px;
      color: var(--text);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      color: white;
      margin-bottom: 25px;
    }
    header h1 {
      margin: 0;
      font-size: 2.2rem;
    }
    header p {
      margin-top: 5px;
      opacity: 0.9;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      color: white;
    }
    .stat-card h3 {
      margin: 0;
      font-size: 2.5rem;
    }
    .stat-card p {
      margin: 5px 0 0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .card h2 {
      margin-top: 0;
      font-size: 1.3rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 0.95rem;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:active {
      transform: scale(0.98);
    }
    .btn-primary { background: #5c4eb0; color: white; }
    .btn-success { background: #00b894; color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-danger { background: #ff7675; color: white; }
    .btn-sync { background: #00cec9; color: white; }
    .alert {
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
    }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 0.9rem;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background-color: #f8f9fa;
      color: var(--primary);
    }
    .table-container {
      overflow-x: auto;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>📊 Dashboard RED Intelfon</h1>
    <p>Gestión de Reportes y Sincronización de Datos</p>
  </header>

  <div id="alertBox" class="alert"></div>

  <!-- Tarjetas de Estadísticas -->
  <div class="stats-grid">
    <div class="stat-card">
      <h3 id="cntLeads">0</h3>
      <p>Leads</p>
    </div>
    <div class="stat-card">
      <h3 id="cntHistoriales">0</h3>
      <p>Historiales</p>
    </div>
    <div class="stat-card">
      <h3 id="cntLlamadas">0</h3>
      <p>Llamadas</p>
    </div>
    <div class="stat-card">
      <h3 id="cntTotal">0</h3>
      <p>Total</p>
    </div>
  </div>

  <!-- Configuración Supabase -->
  <div class="card">
    <h2>⚙️ Configuración</h2>
    <div class="form-group">
      <label>URL de Supabase</label>
      <input type="text" id="supabaseUrl" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="form-group">
      <label>Anon Key de Supabase</label>
      <input type="password" id="supabaseKey" placeholder="eyJhbGci...">
    </div>
    <div class="btn-group">
      <button class="btn-secondary" onclick="toggleKeys()">👁️ Mostrar/Ocultar Credenciales</button>
      <button class="btn-secondary" onclick="limpiarCredenciales()">🗑️ Limpiar Credenciales</button>
    </div>
  </div>

  <!-- Filtros y Acciones -->
  <div class="card">
    <h2>📋 Filtros y Acciones</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
      <div class="form-group">
        <label>Tabla</label>
        <select id="selTabla">
          <option value="todas">Todas las tablas</option>
          <option value="leads">Leads</option>
          <option value="historiales">Historiales</option>
          <option value="llamadas">Llamadas</option>
        </select>
      </div>
      <div class="form-group">
        <label>Desde</label>
        <input type="date" id="fDesde">
      </div>
      <div class="form-group">
        <label>Hasta</label>
        <input type="date" id="fHasta">
      </div>
      <div class="form-group">
        <label>Buscar</label>
        <input type="text" id="txtBuscar" placeholder="Buscar por cualquier campo...">
      </div>
    </div>

    <div class="btn-group">
      <button class="btn-primary" onclick="cargarTodo()">🔄 Cargar BD (Supabase)</button>
      <button class="btn-sync" onclick="sincronizarEdgeFunction()">⚡ Sincronizar desde API Externa</button>
      <button class="btn-secondary" onclick="aplicarFiltros()">🔍 Aplicar Filtros</button>
      <button class="btn-success" onclick="exportarCSV()">📥 Exportar CSV</button>
    </div>
  </div>

  <!-- Visualización de Datos -->
  <div class="card">
    <h2>📂 Datos Registrados</h2>
    <div class="table-container">
      <table id="tablaDatos">
        <thead>
          <tr id="headersTabla">
            <th>Selecciona una tabla o presiona Cargar BD</th>
          </tr>
        </thead>
        <tbody id="bodyTabla">
          <tr><td>No hay datos cargados aún.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let supabaseClient = null;
  let datosCargados = { leads: [], historiales: [], llamadas: [] };

  window.onload = () => {
    const savedUrl = localStorage.getItem('sb_url');
    const savedKey = localStorage.getItem('sb_key');
    if (savedUrl) document.getElementById('supabaseUrl').value = savedUrl;
    if (savedKey) document.getElementById('supabaseKey').value = savedKey;
    if (savedUrl && savedKey) initSupabase(savedUrl, savedKey);
  };

  function showAlert(msg, type = 'info') {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.innerText = msg;
    box.style.display = 'block';
  }

  function initSupabase(url, key) {
    try {
      supabaseClient = supabase.createClient(url, key);
      localStorage.setItem('sb_url', url);
      localStorage.setItem('sb_key', key);
      return true;
    } catch (e) {
      showAlert('Error inicializando Supabase: ' + e.message, 'danger');
      return false;
    }
  }

  function getCreds() {
    const url = document.getElementById('supabaseUrl').value.trim();
    const key = document.getElementById('supabaseKey').value.trim();
    if (!url || !key) {
      showAlert('Por favor ingresa la URL y la Anon Key de Supabase', 'danger');
      return null;
    }
    if (!supabaseClient) initSupabase(url, key);
    return { url, key };
  }

  function toggleKeys() {
    const input = document.getElementById('supabaseKey');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function limpiarCredenciales() {
    localStorage.removeItem('sb_url');
    localStorage.removeItem('sb_key');
    document.getElementById('supabaseUrl').value = '';
    document.getElementById('supabaseKey').value = '';
    supabaseClient = null;
    showAlert('Credenciales borradas de la memoria local', 'info');
  }

  async function cargarTodo() {
    const creds = getCreds();
    if (!creds) return;

    showAlert('Cargando registros desde Supabase...', 'info');

    try {
      const [rLeads, rHist, rLlam] = await Promise.all([
        supabaseClient.from('leads').select('*'),
        supabaseClient.from('historiales').select('*'),
        supabaseClient.from('llamadas').select('*')
      ]);

      datosCargados.leads = rLeads.data || [];
      datosCargados.historiales = rHist.data || [];
      datosCargados.llamadas = rLlam.data || [];

      document.getElementById('cntLeads').innerText = datosCargados.leads.length;
      document.getElementById('cntHistoriales').innerText = datosCargados.historiales.length;
      document.getElementById('cntLlamadas').innerText = datosCargados.llamadas.length;
      document.getElementById('cntTotal').innerText = 
        datosCargados.leads.length + datosCargados.historiales.length + datosCargados.llamadas.length;

      renderTabla();
      showAlert('¡Datos actualizados desde Supabase correctamente!', 'success');
    } catch (err) {
      showAlert('Error al consultar Supabase: ' + err.message, 'danger');
    }
  }

  async function sincronizarEdgeFunction() {
    const creds = getCreds();
    if (!creds) return;

    const endpoint = `${creds.url}/functions/v1/sincronizar-datos`;
    showAlert('Ejecutando Edge Function para consultar API externa...', 'info');

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${creds.key}`
        }
      });

      const res = await response.json();
      if (res.success) {
        showAlert('¡Sincronización con la API exitosa! Cargando datos...', 'success');
        cargarTodo();
      } else {
        showAlert('Error devuelto por la Edge Function: ' + (res.error || res.message), 'danger');
      }
    } catch (err) {
      showAlert('Error llamando a la Edge Function: ' + err.message, 'danger');
    }
  }

  function renderTabla() {
    const sel = document.getElementById('selTabla').value;
    const body = document.getElementById('bodyTabla');
    const headers = document.getElementById('headersTabla');
    body.innerHTML = '';
    headers.innerHTML = '';

    let lista = [];
    if (sel === 'leads') lista = datosCargados.leads;
    else if (sel === 'historiales') lista = datosCargados.historiales;
    else if (sel === 'llamadas') lista = datosCargados.llamadas;
    else lista = [...datosCargados.leads, ...datosCargados.historiales, ...datosCargados.llamadas];

    if (lista.length === 0) {
      headers.innerHTML = '<th>Resultado</th>';
      body.innerHTML = '<tr><td>No hay registros para mostrar.</td></tr>';
      return;
    }

    const keys = Object.keys(lista[0]);
    keys.forEach(k => {
      const th = document.createElement('th');
      th.innerText = k;
      headers.appendChild(th);
    });

    lista.forEach(row => {
      const tr = document.createElement('tr');
      keys.forEach(k => {
        const td = document.createElement('td');
        td.innerText = typeof row[k] === 'object' ? JSON.stringify(row[k]) : (row[k] ?? '');
        tr.appendChild(td);
      });
      body.appendChild(tr);
    });
  }

  function aplicarFiltros() {
    renderTabla();
  }

  function exportarCSV() {
    const sel = document.getElementById('selTabla').value;
    let lista = [];
    if (sel === 'leads') lista = datosCargados.leads;
    else if (sel === 'historiales') lista = datosCargados.historiales;
    else if (sel === 'llamadas') lista = datosCargados.llamadas;
    else lista = [...datosCargados.leads, ...datosCargados.historiales, ...datosCargados.llamadas];

    if (lista.length === 0) {
      alert('No hay datos para exportar');
      return;
    }

    const keys = Object.keys(lista[0]);
    let csv = keys.join(',') + '\n';
    lista.forEach(row => {
      csv += keys.map(k => `"${(row[k] ?? '').toString().replace(/"/g, '""')}"`).join(',') + '\n';
    });

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reporte_${sel}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }
</script>
</body>
</html>
