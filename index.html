<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Intelfon - Reportes</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

  <div class="max-w-7xl mx-auto space-y-6">

    <!-- Mensaje de Notificación -->
    <div id="alert-banner" class="hidden p-4 rounded-lg bg-emerald-600/20 border border-emerald-500 text-emerald-300 font-medium transition-all">
      ¡Operación realizada exitosamente!
    </div>

    <!-- TARJETAS DE MÉTRICAS -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="bg-slate-800/80 border border-slate-700/60 p-5 rounded-xl shadow-lg">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Leads</p>
        <h3 id="card-leads" class="text-3xl font-extrabold text-indigo-400 mt-2">0</h3>
      </div>
      <div class="bg-slate-800/80 border border-slate-700/60 p-5 rounded-xl shadow-lg">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Historiales</p>
        <h3 id="card-historiales" class="text-3xl font-extrabold text-blue-400 mt-2">0</h3>
      </div>
      <div class="bg-slate-800/80 border border-slate-700/60 p-5 rounded-xl shadow-lg">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Llamadas</p>
        <h3 id="card-llamadas" class="text-3xl font-extrabold text-cyan-400 mt-2">0</h3>
      </div>
      <div class="bg-slate-800/80 border border-slate-700/60 p-5 rounded-xl shadow-lg">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total General</p>
        <h3 id="card-total" class="text-3xl font-extrabold text-emerald-400 mt-2">0</h3>
      </div>
    </div>

    <!-- SECCIÓN DE CONFIGURACIÓN DE CREDENCIALES -->
    <div class="bg-slate-800/50 border border-slate-700/60 rounded-xl p-6 shadow-lg">
      <h2 class="text-lg font-bold text-slate-200 flex items-center gap-2 mb-4">
        ⚙️ Configuración
      </h2>
      <div class="space-y-4">
        <div>
          <label class="block text-xs text-slate-400 mb-1">URL de Supabase</label>
          <input type="text" id="supabase-url" value="https://sbopifiyezmvsadwkpg.supabase.co" class="w-full bg-slate-900/90 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">Anon Key de Supabase</label>
          <input type="password" id="supabase-key" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNib3BpZml5ZXptdnNhZHdrcGciLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczODE3NTI1OSwiZXhwIjoyMDUzNzUxMjU5fQ.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNib3BpZml5ZXptdnNhZHdrcGciLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczODE3NTI1OSwiZXhwIjoyMDUzNzUxMjU5fQ" class="w-full bg-slate-900/90 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
        </div>
        <div class="flex gap-2">
          <button onclick="toggleKeyVisibility()" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-medium transition">👁️ Mostrar/Ocultar Credenciales</button>
          <button onclick="limpiarCredenciales()" class="px-3 py-1.5 bg-rose-900/40 border border-rose-700/50 hover:bg-rose-800/50 text-rose-300 rounded-lg text-xs font-medium transition">🗑️ Limpiar Credenciales</button>
        </div>
      </div>
    </div>

    <!-- FILTROS Y ACCIONES -->
    <div class="bg-slate-800/50 border border-slate-700/60 rounded-xl p-6 shadow-lg">
      <h2 class="text-lg font-bold text-slate-200 flex items-center gap-2 mb-4">
        📋 Filtros y Acciones
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
        <div>
          <label class="block text-xs text-slate-400 mb-1">Tabla</label>
          <select id="select-tabla" onchange="cargarDatosBD()" class="w-full bg-slate-900/90 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
            <option value="leads">Leads</option>
            <option value="historiales">Historiales</option>
            <option value="llamadas">Llamadas</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">Desde</label>
          <input type="date" id="fecha-desde" class="w-full bg-slate-900/90 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">Hasta</label>
          <input type="date" id="fecha-hasta" class="w-full bg-slate-900/90 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">Buscar</label>
          <input type="text" id="input-buscar" oninput="filtrarEnFront()" placeholder="Buscar por cualquier campo..." class="w-full bg-slate-900/90 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
        </div>
      </div>

      <!-- BOTONES DE ACCIÓN -->
      <div class="flex flex-wrap gap-3">
        <button onclick="cargarDatosBD()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-semibold shadow-md transition flex items-center gap-2">
          💾 Cargar BD (Supabase)
        </button>
        <button onclick="sincronizarAPIExterna()" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg text-sm font-semibold shadow-md transition flex items-center gap-2">
          ⚡ Sincronizar desde API Externa
        </button>
        <button onclick="cargarDatosBD()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg text-sm font-semibold transition flex items-center gap-2">
          🔍 Aplicar Filtros
        </button>
        <button onclick="exportarCSV()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-semibold shadow-md transition flex items-center gap-2">
          📥 Exportar CSV
        </button>
      </div>
    </div>

    <!-- TABLA DE RESULTADOS -->
    <div class="bg-slate-800/50 border border-slate-700/60 rounded-xl p-6 shadow-lg">
      <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
        📁 Datos Registrados
      </h2>
      <div class="overflow-x-auto rounded-lg border border-slate-700/60 max-h-[500px]">
        <table id="tabla-datos" class="w-full text-left text-sm text-slate-300">
          <thead class="bg-slate-800 text-slate-400 uppercase text-xs sticky top-0 border-b border-slate-700">
            <tr id="tabla-head">
              <th class="p-3">Selecciona una tabla para comenzar</th>
            </tr>
          </thead>
          <tbody id="tabla-body" class="divide-y divide-slate-800 bg-slate-900/50">
            <tr>
              <td class="p-4 text-center text-slate-500">Cargando registros...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- SCRIPT LÓGICO DEL DASHBOARD -->
  <script>
    let supabaseClient = null;
    let datosLocales = [];

    // Inicializar cliente Supabase
    function initSupabase() {
      const url = document.getElementById('supabase-url').value.trim();
      const key = document.getElementById('supabase-key').value.trim();
      if (url && key) {
        supabaseClient = supabase.createClient(url, key);
      }
    }

    // Al cargar la vista
    window.addEventListener('DOMContentLoaded', () => {
      // Establecer fechas por defecto (Mes actual)
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fecha-desde').value = '2026-07-01';
      document.getElementById('fecha-hasta').value = hoy;

      initSupabase();
      cargarTotales();
      cargarDatosBD();
    });

    // Cargar tarjetas superiores
    async function cargarTotales() {
      if (!supabaseClient) initSupabase();
      try {
        const [{ count: lCount }, { count: hCount }, { count: llCount }] = await Promise.all([
          supabaseClient.from('leads').select('*', { count: 'exact', head: true }),
          supabaseClient.from('historiales').select('*', { count: 'exact', head: true }),
          supabaseClient.from('llamadas').select('*', { count: 'exact', head: true })
        ]);

        const totalL = lCount || 0;
        const totalH = hCount || 0;
        const totalLL = llCount || 0;

        document.getElementById('card-leads').innerText = totalL;
        document.getElementById('card-historiales').innerText = totalH;
        document.getElementById('card-llamadas').innerText = totalLL;
        document.getElementById('card-total').innerText = totalL + totalH + totalLL;
      } catch (e) {
        console.error("Error al cargar tarjetas:", e);
      }
    }

    // Campo de fecha correspondiente a cada tabla
    function getCampoFecha(tabla) {
      switch (tabla) {
        case 'leads': return 'fecha_creado';
        case 'historiales': return 'fecha';
        case 'llamadas': return 'fecha';
        default: return 'created_at';
      }
    }

    // Consulta principal
    async function cargarDatosBD() {
      if (!supabaseClient) initSupabase();
      
      const tabla = document.getElementById('select-tabla').value;
      const desde = document.getElementById('fecha-desde').value;
      const hasta = document.getElementById('fecha-hasta').value;
      const campoFecha = getCampoFecha(tabla);

      let query = supabaseClient.from(tabla).select('*');

      if (desde) query = query.gte(campoFecha, desde);
      if (hasta) query = query.lte(campoFecha, hasta);

      let { data, error } = await query.order('created_at', { ascending: false }).limit(300);

      // Si no encuentra nada por el filtro estricto de fecha, carga los últimos 100 registros generales
      if (error || !data || data.length === 0) {
        const fallback = await supabaseClient.from(tabla).select('*').limit(100);
        data = fallback.data || [];
      }

      datosLocales = data;
      renderizarTabla(datosLocales);
      cargarTotales();
    }

    // Dibujar la tabla dinámicamente con las columnas encontradas
    function renderizarTabla(lista) {
      const thead = document.getElementById('tabla-head');
      const tbody = document.getElementById('tabla-body');

      if (!lista || lista.length === 0) {
        thead.innerHTML = '<th class="p-3">Resultado</th>';
        tbody.innerHTML = '<tr><td class="p-4 text-center text-slate-500">No hay registros para mostrar.</td></tr>';
        return;
      }

      // Generar Encabezados dinámicos omitiendo campos muy extensos en vista rápida
      const columnas = Object.keys(lista[0]).filter(c => c !== 'transcripcion');
      thead.innerHTML = columnas.map(col => `<th class="p-3 font-semibold">${col.replace('_', ' ')}</th>`).join('');

      // Generar Filas
      tbody.innerHTML = lista.map(row => {
        return `<tr class="hover:bg-slate-800/60 transition">
          ${columnas.map(col => `<td class="p-3 text-xs max-w-xs truncate">${row[col] !== null ? row[col] : '-'}</td>`).join('')}
        </tr>`;
      }).join('');
    }

    // Disparar la Edge Function para sincronizar desde APIs externas
    async function sincronizarAPIExterna() {
      mostrarAlerta("Ejecutando Edge Function en Supabase...", "cyan");
      try {
        const res = await fetch("https://sbopifiyezmvsadwkpg.supabase.co/functions/v1/sincronizar-datos", {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        });
        const result = await res.json();

        if (result.success) {
          mostrarAlerta("¡Sincronización completada desde API Externa!", "emerald");
          await cargarDatosBD();
        } else {
          mostrarAlerta("Ocurrió un error al sincronizar: " + result.error, "rose");
        }
      } catch (err) {
        mostrarAlerta("Error al conectar con la Edge Function", "rose");
        console.error(err);
      }
    }

    // Buscador sobre los datos descargados
    function filtrarEnFront() {
      const q = document.getElementById('input-buscar').value.toLowerCase();
      if (!q) {
        renderizarTabla(datosLocales);
        return;
      }
      const filtrados = datosLocales.filter(row => 
        Object.values(row).some(v => String(v).toLowerCase().includes(q))
      );
      renderizarTabla(filtrados);
    }

    // Exportar la tabla activa a CSV
    function exportarCSV() {
      if (!datosLocales || datosLocales.length === 0) {
        alert("No hay datos para exportar");
        return;
      }

      const columnas = Object.keys(datosLocales[0]);
      const lineas = [
        columnas.join(','),
        ...datosLocales.map(row => 
          columnas.map(c => `"${String(row[c] ?? '').replace(/"/g, '""')}"`).join(',')
        )
      ];

      const blob = new Blob([lineas.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', `${document.getElementById('select-tabla').value}_reporte.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Utilidades UI
    function toggleKeyVisibility() {
      const input = document.getElementById('supabase-key');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function limpiarCredenciales() {
      document.getElementById('supabase-url').value = '';
      document.getElementById('supabase-key').value = '';
    }

    function mostrarAlerta(msg, color) {
      const banner = document.getElementById('alert-banner');
      banner.innerText = msg;
      banner.className = `p-4 rounded-lg font-medium transition-all border bg-${color}-600/20 border-${color}-500 text-${color}-300`;
      banner.classList.remove('hidden');
      setTimeout(() => banner.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
